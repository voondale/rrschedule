<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>League Schedule Viewer (Firestore)</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>League Schedule Viewer</h1>
    <p class="subtitle">Loads matches from Firestore and renders rounds week-by-week.</p>
  </header>

  <section class="controls">
    <div class="control-block">
      <label for="startDate" class="label">League start date</label>
      <input id="startDate" type="date" />
      <div class="control-row" style="margin-top:8px">
        <button id="saveStartDateBtn" class="secondary">Save start date</button>
        <button id="loadBtn" class="primary">Load schedule</button>
        <button id="expandAllBtn" class="secondary">Expand all</button>
        <button id="collapseAllBtn" class="secondary">Collapse all</button>
      </div>
    </div>

    <div class="control-block">
      <label for="search" class="label">Quick filter (team name)</label>
      <input id="search" type="search" placeholder="Type to filter by team…" />
    </div>

    <div id="error" class="error" role="alert" hidden></div>
  </section>

  <nav id="roundNav" class="round-nav" hidden></nav>
  <main id="schedule" class="schedule" aria-live="polite"></main>

  <footer class="app-footer">
    <p>Schedule and start date are loaded from Firestore.</p>
  </footer>

  <!-- App -->
  <script type="module" src="app.js"></script>
</body>
</html>
